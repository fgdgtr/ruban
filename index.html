<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUEM — Stock Lames de Scie</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e12;
  --surface: #16161c;
  --card: #1e1e26;
  --card2: #26262f;
  --border: #2e2e3a;
  --border2: #3a3a48;
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #4a4a5e;
  --green: #22c55e;
  --green-bg: rgba(34,197,94,.1);
  --yellow: #f59e0b;
  --yellow-bg: rgba(245,158,11,.1);
  --red: #ef4444;
  --red-bg: rgba(239,68,68,.1);
  --accent: #6366f1;
  --r: 14px;
  --rs: 9px;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* mesh bg */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 10% 0%, rgba(99,102,241,.12) 0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 90% 100%, rgba(239,68,68,.08) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}

.page { position: relative; z-index: 1; max-width: 960px; margin: 0 auto; padding: 28px 20px 48px; }

/* ── HEADER ── */
.hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 36px; padding-bottom: 24px;
  border-bottom: 1px solid var(--border);
  gap: 16px; flex-wrap: wrap;
}
.hdr-left { display: flex; align-items: center; gap: 14px; }
.logo {
  width: 42px; height: 42px; background: var(--accent);
  border-radius: 11px; display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 700;
  color: #fff; letter-spacing: 1px; flex-shrink: 0;
}
.hdr-title {
  font-size: 22px; font-weight: 800; letter-spacing: -.4px;
  background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hdr-sub { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; letter-spacing: .5px; }

.sync-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 40px; padding: 7px 14px;
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text2);
}
.sdot { width: 7px; height: 7px; border-radius: 50%; background: var(--text3); transition: all .3s; flex-shrink: 0; }
.sdot.ok { background: var(--green); box-shadow: 0 0 8px rgba(34,197,94,.5); }
.sdot.loading { background: var(--yellow); animation: blink .7s ease-in-out infinite alternate; }
.sdot.error { background: var(--red); }
@keyframes blink { to { opacity: .15; } }

/* ── SCIE BLOCK ── */
.scies-grid { display: flex; flex-direction: column; gap: 20px; }

.scie-block {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  overflow: hidden;
}

.scie-hdr {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
}
.scie-ico {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0;
}
.scie-name { font-size: 16px; font-weight: 800; letter-spacing: -.2px; }
.scie-desc { font-size: 11px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.scie-total {
  margin-left: auto;
  font-family: 'DM Mono', monospace; font-size: 11px;
  color: var(--text2); background: var(--card2);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 4px 12px; white-space: nowrap;
}

.lames-row {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1px;
  background: var(--border);
}

/* ── LAME CARD ── */
.lame-card {
  background: var(--surface);
  padding: 20px;
  display: flex; flex-direction: column; gap: 14px;
}

.lame-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.lame-type {
  font-size: 13px; font-weight: 800; letter-spacing: .5px; text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}
.lame-type.hss { color: #60a5fa; }
.lame-type.carbure { color: #fbbf24; }

.kanban-badge {
  font-size: 10px; font-weight: 700; padding: 3px 10px;
  border-radius: 20px; font-family: 'DM Mono', monospace;
  letter-spacing: .5px; white-space: nowrap; flex-shrink: 0;
  transition: all .3s;
}
.kb-ok { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,.25); }
.kb-warn { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(245,158,11,.25); }
.kb-alert { background: var(--red-bg); color: var(--red); border: 1px solid rgba(239,68,68,.25); animation: pulseRed 1.5s ease-in-out infinite; }
@keyframes pulseRed { 0%,100%{ box-shadow: 0 0 0 rgba(239,68,68,0); } 50%{ box-shadow: 0 0 8px rgba(239,68,68,.4); } }

/* compteur */
.compteur {
  display: flex; align-items: center; gap: 12px;
}
.cpt-num {
  font-family: 'DM Mono', monospace; font-size: 42px; font-weight: 700;
  line-height: 1; letter-spacing: -2px; min-width: 56px; text-align: center;
  transition: all .2s;
}
.cpt-num.green { color: var(--green); }
.cpt-num.yellow { color: var(--yellow); }
.cpt-num.red { color: var(--red); }

.cpt-btns { display: flex; flex-direction: column; gap: 5px; }
.cpt-btn {
  width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--border2); background: var(--card2);
  color: var(--text2); font-size: 18px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all .15s; line-height: 1; font-family: 'DM Mono', monospace;
}
.cpt-btn:hover { background: var(--card); border-color: var(--accent); color: var(--text); }
.cpt-btn:active { transform: scale(.88); }
.cpt-btn.minus:hover { border-color: var(--red); color: var(--red); }
.cpt-btn.plus:hover { border-color: var(--green); color: var(--green); }

.cpt-label { font-size: 10px; color: var(--text3); font-family: 'DM Mono', monospace; letter-spacing: .5px; }

/* barre kanban visuelle */
.kanban-bar {
  display: flex; gap: 3px; align-items: center;
}
.kb-segment {
  height: 5px; border-radius: 3px; flex: 1;
  background: var(--border); transition: background .3s, transform .2s;
}
.kb-segment.filled-ok { background: var(--green); }
.kb-segment.filled-warn { background: var(--yellow); }
.kb-segment.filled-red { background: var(--red); }
.kb-min-mark {
  width: 1px; height: 10px; background: var(--red);
  flex-shrink: 0; border-radius: 1px; position: relative;
}
.kb-min-mark::after {
  content: 'MIN';
  position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
  font-size: 7px; color: var(--red); font-family: 'DM Mono', monospace;
  font-weight: 700; white-space: nowrap;
}

/* bouton commander */
.btn-commander {
  width: 100%; padding: 10px;
  background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.25);
  border-radius: var(--rs); color: #a5b4fc;
  font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
  cursor: pointer; transition: all .15s; letter-spacing: .2px;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.btn-commander:hover {
  background: rgba(99,102,241,.2); border-color: rgba(99,102,241,.5);
  box-shadow: 0 0 16px rgba(99,102,241,.2);
}
.btn-commander:active { transform: scale(.97); }

/* ── MODAL COMMANDE ── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal-box {
  background: #1a1a22; border: 1px solid var(--border2);
  border-radius: 20px; padding: 28px; max-width: 380px; width: 100%;
  box-shadow: 0 24px 60px rgba(0,0,0,.6);
  animation: modalIn .25s cubic-bezier(.34,1.4,.64,1);
}
@keyframes modalIn { from { opacity:0; transform: translateY(20px) scale(.95); } to { opacity:1; transform: none; } }
.modal-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
.modal-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }
.modal-field { margin-bottom: 16px; }
.modal-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: 1.5px; text-transform: uppercase; font-family: 'DM Mono', monospace; margin-bottom: 8px; display: block; }
.modal-inp {
  width: 100%; background: var(--card2); border: 1px solid var(--border2);
  border-radius: var(--rs); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 700;
  padding: 12px 16px; outline: none; text-align: center; transition: border-color .15s;
}
.modal-inp:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 10px; margin-top: 20px; }
.btn-cancel {
  flex: 1; padding: 12px; background: var(--card2);
  border: 1px solid var(--border2); border-radius: var(--rs);
  color: var(--text2); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700; cursor: pointer; transition: all .15s;
}
.btn-cancel:hover { background: var(--card); }
.btn-confirm {
  flex: 2; padding: 12px;
  background: linear-gradient(135deg, var(--accent), #818cf8);
  border: none; border-radius: var(--rs); color: white;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 800;
  cursor: pointer; box-shadow: 0 4px 16px rgba(99,102,241,.35); transition: all .2s;
}
.btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(99,102,241,.5); }
.btn-confirm:active { transform: scale(.97); }

/* historique commandes */
.hist-section {
  margin-top: 32px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 18px; overflow: hidden;
}
.hist-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--card);
}
.hist-title { font-size: 14px; font-weight: 800; }
.btn-clear-hist {
  font-size: 11px; color: var(--text3); background: none; border: none;
  cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600;
  transition: color .15s;
}
.btn-clear-hist:hover { color: var(--red); }
.hist-list { padding: 12px; display: flex; flex-direction: column; gap: 6px; max-height: 260px; overflow-y: auto; }
.hist-empty { text-align: center; padding: 24px; color: var(--text3); font-size: 12px; font-style: italic; }
.hist-item {
  background: var(--card2); border: 1px solid var(--border);
  border-radius: 10px; padding: 10px 14px;
  display: flex; align-items: center; gap: 12px;
}
.hist-ico { font-size: 16px; flex-shrink: 0; }
.hist-body { flex: 1; min-width: 0; }
.hist-ref { font-size: 13px; font-weight: 700; font-family: 'DM Mono', monospace; color: var(--text); }
.hist-meta { font-size: 9px; color: var(--text3); margin-top: 2px; font-family: 'DM Mono', monospace; }
.hist-badge {
  font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px;
  font-family: 'DM Mono', monospace; background: rgba(99,102,241,.15); color: #a5b4fc;
  border: 1px solid rgba(99,102,241,.25); flex-shrink: 0;
}

/* toast */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--card2); border: 1px solid var(--border2);
  color: var(--text); font-size: 13px; font-weight: 700;
  padding: 10px 18px; border-radius: 22px;
  transition: transform .3s cubic-bezier(.34,1.4,.64,1);
  z-index: 999; white-space: nowrap;
  display: flex; align-items: center; gap: 7px; pointer-events: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.4);
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="page">

  <!-- HEADER -->
  <div class="hdr">
    <div class="hdr-left">
      <div class="logo">AUEM</div>
      <div>
        <div class="hdr-title">Stock Lames de Scie</div>
        <div class="hdr-sub">KANBAN  3 SCIES  HSS + CARBURE</div>
      </div>
    </div>
    <div class="sync-pill">
      <div class="sdot loading" id="sdot"></div>
      <span id="stime">Sync…</span>
    </div>
  </div>

  <!-- SCIES -->
  <div class="scies-grid" id="scies-grid"></div>

  <!-- HISTORIQUE -->
  <div class="hist-section">
    <div class="hist-hdr">
      <div class="hist-title">📋 Historique des commandes</div>
      <button class="btn-clear-hist" onclick="clearHist()">Effacer</button>
    </div>
    <div class="hist-list" id="hist-list">
      <div class="hist-empty">Aucune commande enregistrée</div>
    </div>
  </div>

</div>

<!-- MODAL COMMANDE -->
<div class="modal-bg" id="modal-bg">
  <div class="modal-box">
    <div class="modal-title">📦 Enregistrer une commande</div>
    <div class="modal-sub" id="modal-sub">Combien de lames avez-vous commandé ?</div>
    <div class="modal-field">
      <label class="modal-label">Quantité commandée</label>
      <input class="modal-inp" id="modal-qty" type="number" min="1" max="99" value="1" />
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmCommande()">✓ Confirmer la commande</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="t-i"></span><span id="t-m"></span></div>

<script>
var FIREBASE = 'https://ruban-be81a-default-rtdb.europe-west1.firebasedatabase.app/stock_lames.json';
var SEUIL_MIN = 2;
var MAX_BAR = 10; // segments dans la barre kanban

var SCIES = [
  { id: 'kasto',    name: 'Kasto CUT E2', icon: '⚙️', desc: 'Scie à ruban automatique' },
  { id: 'behringer', name: 'Behringer',    icon: '🔧', desc: 'Scie à ruban semi-auto' },
  { id: 'twin',     name: 'Twin',          icon: '✂️', desc: 'Scie à ruban manuelle' }
];

var TYPES = [
  { id: 'hss',     label: 'HSS',     cls: 'hss' },
  { id: 'carbure', label: 'Carbure', cls: 'carbure' }
];

var state = {};
var histCommandes = [];
var pendingCmd = null;
var saveTimer = null;
var toastTimer = null;

/* ── INIT STATE ── */
function initState() {
  var s = {};
  SCIES.forEach(function(sc) {
    s[sc.id] = {};
    TYPES.forEach(function(t) {
      s[sc.id][t.id] = 0;
    });
  });
  return s;
}

function migrateState(data) {
  var s = data || initState();
  SCIES.forEach(function(sc) {
    if (!s[sc.id]) s[sc.id] = {};
    TYPES.forEach(function(t) {
      if (typeof s[sc.id][t.id] !== 'number') s[sc.id][t.id] = 0;
    });
  });
  return s;
}

/* ── SYNC ── */
function setDot(st) {
  var dot = document.getElementById('sdot');
  var time = document.getElementById('stime');
  dot.className = 'sdot ' + st;
  if (st === 'ok') {
    var n = new Date();
    time.textContent = pad(n.getHours()) + ':' + pad(n.getMinutes());
    setTimeout(function() { time.textContent = 'Sync OK'; }, 2000);
  } else if (st === 'loading') {
    time.textContent = 'Sync…';
  } else {
    time.textContent = 'Hors-ligne';
  }
}
function pad(n) { return n < 10 ? '0' + n : '' + n; }

function loadFromServer() {
  setDot('loading');
  var xhr = new XMLHttpRequest();
  xhr.open('GET', FIREBASE, true);
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    if (xhr.status === 200) {
      try {
        var raw = JSON.parse(xhr.responseText);
        state = migrateState(raw);
        setDot('ok');
      } catch(e) { state = initState(); setDot('error'); }
    } else {
      loadLocal(); setDot('error');
    }
    render();
  };
  xhr.onerror = function() { loadLocal(); setDot('error'); render(); };
  xhr.send();
}

function loadLocal() {
  try { state = migrateState(JSON.parse(localStorage.getItem('auem_lames') || '{}')); }
  catch(e) { state = initState(); }
}

function saveToServer() {
  setDot('loading');
  var body = JSON.stringify(state);
  var xhr = new XMLHttpRequest();
  xhr.open('PUT', FIREBASE, true);
  xhr.setRequestHeader('Content-Type', 'application/json');
  xhr.onreadystatechange = function() {
    if (xhr.readyState !== 4) return;
    localStorage.setItem('auem_lames', body);
    setDot(xhr.status === 200 ? 'ok' : 'error');
  };
  xhr.onerror = function() { localStorage.setItem('auem_lames', body); setDot('error'); };
  xhr.send(body);
}

function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(saveToServer, 600); }
setInterval(function() { loadFromServer(); }, 30000);

/* ── HISTORIQUE ── */
function loadHist() {
  try { histCommandes = JSON.parse(localStorage.getItem('auem_lames_hist') || '[]'); }
  catch(e) { histCommandes = []; }
}
function saveHist() { localStorage.setItem('auem_lames_hist', JSON.stringify(histCommandes)); }
function addHist(scieId, typeId, qty) {
  var scie = SCIES.find(function(s) { return s.id === scieId; });
  var type = TYPES.find(function(t) { return t.id === typeId; });
  histCommandes.unshift({
    scie: scie ? scie.name : scieId,
    type: type ? type.label : typeId,
    qty: qty,
    date: new Date().toISOString()
  });
  if (histCommandes.length > 50) histCommandes.pop();
  saveHist();
}
function clearHist() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  histCommandes = [];
  saveHist();
  renderHist();
  showToast('Historique effacé', '🗑️');
}

/* ── KANBAN STATUS ── */
function getStatus(qty) {
  if (qty <= 0) return 'alert';
  if (qty <= SEUIL_MIN) return 'warn';
  return 'ok';
}
function getStatusLabel(qty) {
  if (qty <= 0) return '🔴 RUPTURE';
  if (qty <= SEUIL_MIN) return '🟡 COMMANDER';
  return '🟢 OK';
}
function getStatusCls(qty) {
  if (qty <= 0) return 'kb-alert';
  if (qty <= SEUIL_MIN) return 'kb-warn';
  return 'kb-ok';
}
function getNumCls(qty) {
  if (qty <= 0) return 'red';
  if (qty <= SEUIL_MIN) return 'yellow';
  return 'green';
}

/* ── RENDER ── */
function render() {
  renderScies();
  renderHist();
}

function renderScies() {
  var grid = document.getElementById('scies-grid');
  grid.innerHTML = '';
  SCIES.forEach(function(scie) {
    var block = document.createElement('div');
    block.className = 'scie-block';

    // total lames
    var total = 0;
    TYPES.forEach(function(t) { total += (state[scie.id] && state[scie.id][t.id]) || 0; });

    block.innerHTML =
      '<div class="scie-hdr">' +
        '<div class="scie-ico">' + scie.icon + '</div>' +
        '<div><div class="scie-name">' + scie.name + '</div><div class="scie-desc">' + scie.desc + '</div></div>' +
        '<div class="scie-total">' + total + ' lames total</div>' +
      '</div>' +
      '<div class="lames-row" id="lames-' + scie.id + '"></div>';

    grid.appendChild(block);

    var lamesRow = document.getElementById('lames-' + scie.id);
    TYPES.forEach(function(type) {
      var qty = (state[scie.id] && state[scie.id][type.id]) || 0;
      lamesRow.appendChild(buildLameCard(scie, type, qty));
    });
  });
}

function buildLameCard(scie, type, qty) {
  var card = document.createElement('div');
  card.className = 'lame-card';
  card.id = 'card-' + scie.id + '-' + type.id;

  // barre kanban (max MAX_BAR segments)
  var barHtml = '<div class="kanban-bar">';
  for (var i = 0; i < MAX_BAR; i++) {
    if (i === SEUIL_MIN) barHtml += '<div class="kb-min-mark"></div>';
    var filled = i < qty;
    var segCls = '';
    if (filled) {
      if (qty <= SEUIL_MIN) segCls = i < qty ? 'filled-red' : '';
      else segCls = 'filled-ok';
    }
    barHtml += '<div class="kb-segment ' + segCls + '"></div>';
  }
  barHtml += '</div>';

  card.innerHTML =
    '<div class="lame-top">' +
      '<div class="lame-type ' + type.cls + '">' + type.label + '</div>' +
      '<div class="kanban-badge ' + getStatusCls(qty) + '">' + getStatusLabel(qty) + '</div>' +
    '</div>' +
    '<div class="compteur">' +
      '<div class="cpt-btns">' +
        '<button class="cpt-btn plus" onclick="changeQty(\'' + scie.id + '\',\'' + type.id + '\',1)" title="Ajouter une lame">+</button>' +
        '<button class="cpt-btn minus" onclick="changeQty(\'' + scie.id + '\',\'' + type.id + '\',-1)" title="Retirer une lame">−</button>' +
      '</div>' +
      '<div>' +
        '<div class="cpt-num ' + getNumCls(qty) + '" id="num-' + scie.id + '-' + type.id + '">' + qty + '</div>' +
        '<div class="cpt-label">LAMES EN STOCK</div>' +
      '</div>' +
    '</div>' +
    barHtml +
    '<button class="btn-commander" onclick="openCommande(\'' + scie.id + '\',\'' + type.id + '\')">📦 Enregistrer une commande</button>';

  return card;
}

function renderHist() {
  var list = document.getElementById('hist-list');
  if (!histCommandes.length) {
    list.innerHTML = '<div class="hist-empty">Aucune commande enregistrée</div>';
    return;
  }
  list.innerHTML = histCommandes.map(function(h) {
    var d = new Date(h.date);
    var ds = d.toLocaleDateString('fr-FR') + ' à ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
    return '<div class="hist-item">' +
      '<span class="hist-ico">📦</span>' +
      '<div class="hist-body">' +
        '<div class="hist-ref">' + h.scie + ' — ' + h.type + '</div>' +
        '<div class="hist-meta">' + ds + '</div>' +
      '</div>' +
      '<span class="hist-badge">+' + h.qty + ' lames</span>' +
    '</div>';
  }).join('');
}

/* ── ACTIONS ── */
function changeQty(scieId, typeId, delta) {
  if (!state[scieId]) state[scieId] = {};
  var current = state[scieId][typeId] || 0;
  var newVal = Math.max(0, current + delta);
  state[scieId][typeId] = newVal;
  // Mise à jour rapide sans re-render complet
  updateCard(scieId, typeId, newVal);
  scheduleSave();
  if (delta < 0 && newVal <= SEUIL_MIN) {
    showToast('Stock bas ! Pensez à commander', '⚠️');
  }
}

function updateCard(scieId, typeId, qty) {
  // Mettre à jour juste le chiffre, la barre et le badge
  var numEl = document.getElementById('num-' + scieId + '-' + typeId);
  if (numEl) {
    numEl.textContent = qty;
    numEl.className = 'cpt-num ' + getNumCls(qty);
  }
  // Re-render la card complète pour la barre et le badge
  var card = document.getElementById('card-' + scieId + '-' + typeId);
  if (card) {
    var scie = SCIES.find(function(s) { return s.id === scieId; });
    var type = TYPES.find(function(t) { return t.id === typeId; });
    if (scie && type) {
      var newCard = buildLameCard(scie, type, qty);
      card.parentNode.replaceChild(newCard, card);
    }
  }
  // Mettre à jour total scie
  renderScieTotal(scieId);
}

function renderScieTotal(scieId) {
  var total = 0;
  TYPES.forEach(function(t) { total += (state[scieId] && state[scieId][t.id]) || 0; });
  var block = document.querySelector('#lames-' + scieId);
  if (block) {
    var totalEl = block.parentElement.querySelector('.scie-total');
    if (totalEl) totalEl.textContent = total + ' lames total';
  }
}

/* ── MODAL COMMANDE ── */
function openCommande(scieId, typeId) {
  var scie = SCIES.find(function(s) { return s.id === scieId; });
  var type = TYPES.find(function(t) { return t.id === typeId; });
  pendingCmd = { scieId: scieId, typeId: typeId };
  document.getElementById('modal-sub').textContent =
    'Commande pour ' + (scie ? scie.name : scieId) + ' — Lames ' + (type ? type.label : typeId);
  document.getElementById('modal-qty').value = '1';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(function() { document.getElementById('modal-qty').focus(); document.getElementById('modal-qty').select(); }, 100);
}

function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  pendingCmd = null;
}

function confirmCommande() {
  if (!pendingCmd) return;
  var qty = parseInt(document.getElementById('modal-qty').value) || 0;
  if (qty <= 0) { showToast('Entrez une quantité valide', '⚠️'); return; }
  var scieId = pendingCmd.scieId;
  var typeId = pendingCmd.typeId;
  if (!state[scieId]) state[scieId] = {};
  state[scieId][typeId] = (state[scieId][typeId] || 0) + qty;
  addHist(scieId, typeId, qty);
  closeModal();
  render();
  scheduleSave();
  var scie = SCIES.find(function(s) { return s.id === scieId; });
  var type = TYPES.find(function(t) { return t.id === typeId; });
  showToast('+' + qty + ' lames ' + (type ? type.label : '') + ' (' + (scie ? scie.name : '') + ')', '✅');
}

document.getElementById('modal-bg').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.getElementById('modal-qty').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') confirmCommande();
  if (e.key === 'Escape') closeModal();
});

/* ── TOAST ── */
function showToast(msg, ico) {
  document.getElementById('t-i').textContent = ico || '';
  document.getElementById('t-m').textContent = msg;
  var el = document.getElementById('toast');
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { el.classList.remove('show'); }, 2400);
}

/* ── INIT ── */
loadHist();
loadFromServer();
</script>
</body>
</html>
