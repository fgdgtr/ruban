<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AUEM — Stock Lames de Scie</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Barlow:wght@400;500;600;700&family=DM+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   AUEM — STOCK LAMES DE SCIE
   Esthétique : Industriel précis, HMI atelier
   Couleurs : fond très sombre + accents nets
   Typographie : Barlow Condensed pour les chiffres,
                 Barlow pour le texte, DM Mono pour codes
═══════════════════════════════════════ */

:root {
  /* Fond & surfaces */
  --bg:       #080910;
  --s0:       #0d0e14;
  --s1:       #12131b;
  --s2:       #181921;
  --s3:       #1e1f2a;
  --s4:       #252636;

  /* Bordures */
  --b1:       #23243a;
  --b2:       #2e2f47;
  --b3:       #3d3f5c;

  /* Texte */
  --t0:       #ffffff;
  --t1:       #d4d5e8;
  --t2:       #7a7c9e;
  --t3:       #3d3f5e;

  /* Statuts — teintes claires très saturées */
  --ok:       #00e87a;
  --ok-dim:   #00c467;
  --ok-bg:    rgba(0,232,122,.07);
  --ok-bd:    rgba(0,232,122,.22);
  --ok-glow:  0 0 24px rgba(0,232,122,.35);

  --warn:     #ffb300;
  --warn-dim: #e09f00;
  --warn-bg:  rgba(255,179,0,.07);
  --warn-bd:  rgba(255,179,0,.22);
  --warn-glow:0 0 24px rgba(255,179,0,.35);

  --alert:    #ff3b3b;
  --alert-dim:#e03030;
  --alert-bg: rgba(255,59,59,.08);
  --alert-bd: rgba(255,59,59,.25);
  --alert-glow:0 0 28px rgba(255,59,59,.4);

  --blue:     #4f8fff;
  --blue-bg:  rgba(79,143,255,.08);
  --blue-bd:  rgba(79,143,255,.25);

  --hss-c:    #7eb8ff;
  --carb-c:   #ffd166;

  --mono: 'DM Mono', monospace;
  --cond: 'Barlow Condensed', sans-serif;
  --body: 'Barlow', sans-serif;
  --r:    10px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--t1);
  font-family: var(--body);
  min-height: 100vh;
  overflow-x: hidden;
  /* texture subtile */
  background-image:
    radial-gradient(ellipse 70% 50% at 15% 0%,   rgba(79,143,255,.06) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 85% 100%,  rgba(255,59,59,.05)  0%, transparent 50%);
}

/* grille fine façon HMI industriel */
body::after {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,.022) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.022) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events:none;
  z-index:0;
}

.page {
  position:relative; z-index:1;
  max-width: 1180px;
  margin: 0 auto;
  padding: 0 0 52px;
}

/* ═══════════════════════════════════════
   TOP NAVBAR
═══════════════════════════════════════ */
.navbar {
  display:flex; align-items:stretch;
  height: 56px;
  border-bottom: 1px solid var(--b1);
  background: var(--s0);
  position: sticky; top:0; z-index:90;
  backdrop-filter: blur(10px);
}

.nb-brand {
  display:flex; align-items:center; gap:12px;
  padding: 0 20px;
  border-right: 1px solid var(--b1);
  flex-shrink: 0;
}

.nb-logo {
  width: 32px; height: 32px;
  background: var(--blue);
  border-radius: 7px;
  display:flex; align-items:center; justify-content:center;
  font-family: var(--mono);
  font-size: 8px; font-weight:600;
  color:#fff; letter-spacing:1px;
  line-height: 1.3; text-align:center;
  flex-shrink:0;
}

.nb-title {
  font-family: var(--cond);
  font-size: 18px; font-weight:700;
  letter-spacing:.5px;
  color: var(--t0);
  white-space:nowrap;
}
.nb-sub {
  font-family: var(--mono);
  font-size: 9px; color: var(--t3);
  letter-spacing:1.5px;
  text-transform:uppercase;
  margin-top:2px;
}

/* indicateurs navbarre */
.nb-indicators {
  display:flex; align-items:center;
  padding: 0 16px;
  gap: 6px;
  border-right: 1px solid var(--b1);
}

.nb-ind {
  display:flex; align-items:center; gap:6px;
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid transparent;
  font-family: var(--mono);
  font-size: 11px;
  font-weight:600;
  transition: all .2s;
}
.nb-ind-dot {
  width:8px; height:8px;
  border-radius:50%;
  flex-shrink:0;
}
.nb-ind.i-ok    { background:var(--ok-bg);    border-color:var(--ok-bd);    color:var(--ok);   }
.nb-ind.i-warn  { background:var(--warn-bg);  border-color:var(--warn-bd);  color:var(--warn); }
.nb-ind.i-alert { background:var(--alert-bg); border-color:var(--alert-bd); color:var(--alert);}
.nb-ind-dot.ok    { background:var(--ok);    box-shadow: 0 0 6px var(--ok); }
.nb-ind-dot.warn  { background:var(--warn);  box-shadow: 0 0 6px var(--warn); }
.nb-ind-dot.alert { background:var(--alert); animation: dotPulse 1s ease-in-out infinite; }
@keyframes dotPulse { 0%,100%{opacity:1} 50%{opacity:.3} }

.nb-right {
  margin-left:auto;
  display:flex; align-items:center;
  gap:8px; padding: 0 16px;
}

.sync-chip {
  display:flex; align-items:center; gap:7px;
  padding: 6px 12px;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 10px; color: var(--t2);
  white-space:nowrap;
}
.sdot {
  width:6px; height:6px; border-radius:50%;
  background: var(--t3); transition:all .3s; flex-shrink:0;
}
.sdot.ok      { background:var(--ok);    box-shadow:0 0 6px var(--ok); }
.sdot.loading { background:var(--warn);  animation: blink .6s ease-in-out infinite alternate; }
.sdot.error   { background:var(--alert); }
@keyframes blink { to { opacity:.1; } }

.btn-outils {
  display:flex; align-items:center; gap:7px;
  padding: 7px 14px;
  background: var(--s3);
  border: 1px solid var(--b2);
  border-radius: 6px;
  font-family: var(--body);
  font-size: 12px; font-weight:600;
  color: var(--t2);
  cursor:pointer;
  transition: all .15s;
  white-space:nowrap;
}
.btn-outils:hover { background:var(--s4); border-color:var(--b3); color:var(--t1); }

/* ═══════════════════════════════════════
   LÉGENDE KANBAN — bande colorée
═══════════════════════════════════════ */
.legend-strip {
  display:flex; align-items:center;
  gap:0;
  border-bottom: 1px solid var(--b1);
  overflow:hidden;
  font-family: var(--mono);
  font-size: 10px;
}
.ls-item {
  display:flex; align-items:center; gap:8px;
  padding: 9px 20px;
  border-right: 1px solid var(--b1);
  white-space:nowrap;
}
.ls-swatch {
  width: 12px; height: 12px;
  border-radius: 3px;
  flex-shrink:0;
}
.ls-item.ok    { color:var(--ok);    background: rgba(0,232,122,.04); }
.ls-item.warn  { color:var(--warn);  background: rgba(255,179,0,.04); }
.ls-item.alert { color:var(--alert); background: rgba(255,59,59,.04); }
.ls-item.info  { color:var(--t2);    background: transparent; }
.ls-seuil-val  { color:var(--warn);  font-weight:600; }
.ls-spacer { flex:1; }
.ls-time   {
  padding: 9px 20px;
  color: var(--t3);
  border-left: 1px solid var(--b1);
  font-size: 10px;
}

/* ═══════════════════════════════════════
   CORPS — GRILLE
═══════════════════════════════════════ */
.scies-wrap { padding: 20px 20px 0; display:flex; flex-direction:column; gap:16px; }

/* ═══════════════════════════════════════
   BLOC SCIE
═══════════════════════════════════════ */
.scie-block {
  border-radius: 14px;
  border: 1px solid var(--b2);
  overflow:hidden;
  background: var(--s1);
  transition: border-color .2s;
  position:relative;
}

/* trait gauche statut */
.scie-block::before {
  content:'';
  position:absolute;
  left:0; top:0; bottom:0;
  width:3px;
  border-radius:3px 0 0 3px;
  transition: background .3s;
}
.scie-block.s-ok::before    { background: var(--ok); }
.scie-block.s-warn::before  { background: var(--warn); }
.scie-block.s-alert::before { background: var(--alert);
  box-shadow: 2px 0 12px rgba(255,59,59,.5);
  animation: trackPulse 1.6s ease-in-out infinite;
}
@keyframes trackPulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.scie-block.s-alert { border-color: rgba(255,59,59,.25); }
.scie-block.s-warn  { border-color: rgba(255,179,0,.2); }

/* header scie */
.scie-hdr {
  display:flex; align-items:center; gap:14px;
  padding: 14px 18px 14px 22px;
  border-bottom: 1px solid var(--b1);
  background: var(--s2);
}

.scie-ico {
  font-size:20px;
  width:36px; text-align:center;
  flex-shrink:0;
}

.scie-name {
  font-family: var(--cond);
  font-size: 17px; font-weight:700;
  letter-spacing:.3px;
  color: var(--t0);
}
.scie-desc {
  font-family: var(--mono);
  font-size: 9px; color: var(--t3);
  letter-spacing:1px;
  text-transform:uppercase;
  margin-top:3px;
}

.scie-total-pill {
  margin-left:auto;
  font-family: var(--mono);
  font-size: 11px; font-weight:600;
  color: var(--t2);
  background: var(--s3);
  border: 1px solid var(--b2);
  border-radius: 20px;
  padding: 4px 14px;
  white-space:nowrap;
  flex-shrink:0;
}

/* grille 2 colonnes lames */
.lames-row {
  display:grid;
  grid-template-columns: 1fr 1fr;
}
.lame-card {
  padding: 22px 22px 20px 24px;
  display:flex; flex-direction:column; gap:18px;
  border-right: 1px solid var(--b1);
  position:relative;
  transition: background .15s;
}
.lame-card:last-child { border-right:none; }
.lame-card:hover { background: rgba(255,255,255,.012); }

/* ═══════════════════════════════════════
   EN-TÊTE LAME
═══════════════════════════════════════ */
.lame-top {
  display:flex; align-items:center; gap:10px;
}

.lame-type-tag {
  font-family: var(--mono);
  font-size: 11px; font-weight:600;
  letter-spacing: 2px;
  padding: 4px 12px;
  border-radius: 5px;
  text-transform:uppercase;
}
.lame-type-tag.hss    { background:rgba(126,184,255,.1); color:var(--hss-c);  border:1px solid rgba(126,184,255,.22); }
.lame-type-tag.carbure{ background:rgba(255,209,102,.1); color:var(--carb-c); border:1px solid rgba(255,209,102,.22); }

/* badge statut */
.kb-badge {
  font-family: var(--cond);
  font-size: 12px; font-weight:800;
  letter-spacing: 1px;
  padding: 4px 12px;
  border-radius: 5px;
  text-transform:uppercase;
  transition: all .3s;
  white-space:nowrap;
}
.kb-badge.ok    { background:var(--ok-bg);    color:var(--ok);    border:1px solid var(--ok-bd);    }
.kb-badge.warn  { background:var(--warn-bg);  color:var(--warn);  border:1px solid var(--warn-bd);  }
.kb-badge.alert {
  background:var(--alert-bg); color:var(--alert); border:1px solid var(--alert-bd);
  animation: badgePop 1.2s ease-in-out infinite;
}
@keyframes badgePop { 0%,100%{box-shadow:none} 50%{box-shadow:var(--alert-glow)} }

/* ═══════════════════════════════════════
   COMPTEUR GÉANT
═══════════════════════════════════════ */
.cpt-zone {
  display:flex; align-items:center; gap:22px;
}

.cpt-num-wrap {
  display:flex; flex-direction:column;
  align-items:flex-start;
}

.cpt-num {
  font-family: var(--cond);
  font-size: 80px;
  font-weight: 900;
  line-height: .9;
  letter-spacing: -4px;
  transition: color .2s;
  user-select:none;
}
.cpt-num.c-ok    { color: var(--ok); }
.cpt-num.c-warn  { color: var(--warn); }
.cpt-num.c-alert {
  color: var(--alert);
  animation: numFlash 1.4s ease-in-out infinite;
}
@keyframes numFlash { 0%,100%{opacity:1} 50%{opacity:.5} }

/* animation bump au clic */
.cpt-num.bump { animation: bump .15s ease-out forwards; }
@keyframes bump { 0%{transform:scale(1.12)} 100%{transform:scale(1)} }

.cpt-unit {
  font-family: var(--mono);
  font-size: 9px; color: var(--t3);
  letter-spacing: 2px;
  text-transform:uppercase;
  margin-top: 6px;
}

/* boutons +/− */
.cpt-btns {
  display:flex; flex-direction:column; gap:8px;
}

.cpt-btn {
  width: 52px; height: 52px;
  border-radius: 11px;
  border: 1.5px solid var(--b2);
  background: var(--s3);
  color: var(--t2);
  font-size: 26px;
  font-weight: 400;
  font-family: var(--mono);
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition: all .12s;
  line-height:1;
  user-select:none;
  flex-shrink:0;
}
.cpt-btn:active { transform: scale(.82); }
.cpt-btn.plus:hover  {
  background: rgba(0,232,122,.12);
  border-color: var(--ok-bd);
  color: var(--ok);
  box-shadow: 0 0 14px rgba(0,232,122,.2);
}
.cpt-btn.minus:hover {
  background: rgba(255,59,59,.1);
  border-color: var(--alert-bd);
  color: var(--alert);
  box-shadow: 0 0 14px rgba(255,59,59,.18);
}

/* ═══════════════════════════════════════
   BARRE KANBAN
═══════════════════════════════════════ */
.bar-section { display:flex; flex-direction:column; gap:8px; }

.bar-meta {
  display:flex; justify-content:space-between;
  align-items:center;
  font-family: var(--mono);
  font-size: 9px; color: var(--t3);
  letter-spacing:.5px;
}

.kanban-bar {
  display:flex; gap:3px; align-items:center;
  height:10px;
}
.kb-seg {
  height:10px; border-radius:2px;
  flex:1; background: var(--s4);
  transition: background .25s, transform .1s;
}
.kb-seg:hover { transform: scaleY(1.3); }
.kb-seg.f-ok    { background: var(--ok);    box-shadow: 0 0 4px rgba(0,232,122,.3); }
.kb-seg.f-warn  { background: var(--warn);  box-shadow: 0 0 4px rgba(255,179,0,.3); }
.kb-seg.f-alert { background: var(--alert); box-shadow: 0 0 5px rgba(255,59,59,.4); }

.kb-min-mark {
  width: 2px; height: 18px;
  background: var(--alert);
  border-radius: 1px;
  flex-shrink:0;
  position:relative;
  box-shadow: 0 0 6px rgba(255,59,59,.5);
}
.kb-min-mark::after {
  content: 'MIN';
  position:absolute; bottom: -16px; left:50%;
  transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 8px; color:var(--alert);
  font-weight:700; white-space:nowrap;
  letter-spacing:.5px;
}

/* ═══════════════════════════════════════
   BOUTON COMMANDER
═══════════════════════════════════════ */
.btn-cmd {
  display:flex; align-items:center; justify-content:center;
  gap: 8px;
  padding: 11px 16px;
  background: var(--s3);
  border: 1px solid var(--b2);
  border-radius: 9px;
  color: var(--t2);
  font-family: var(--body);
  font-size: 12px; font-weight:600;
  cursor:pointer;
  transition: all .15s;
  width:100%;
  letter-spacing:.2px;
}
.btn-cmd:hover {
  background: var(--blue-bg);
  border-color: var(--blue-bd);
  color: var(--hss-c);
  box-shadow: 0 2px 12px rgba(79,143,255,.15);
}
.btn-cmd:active { transform:scale(.97); }

/* ═══════════════════════════════════════
   PANNEAU OUTILS
═══════════════════════════════════════ */
.tools-panel {
  position:fixed;
  top:64px; right:16px;
  background: var(--s2);
  border: 1px solid var(--b3);
  border-radius: 12px;
  padding: 6px;
  z-index:100;
  display:none; flex-direction:column; gap:2px;
  box-shadow: 0 16px 48px rgba(0,0,0,.65);
  min-width: 210px;
  animation: popDown .14s ease-out;
}
.tools-panel.open { display:flex; }
@keyframes popDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:none} }

.t-item {
  display:flex; align-items:center; gap:10px;
  padding: 10px 14px;
  border-radius: 7px;
  border:none; background:none;
  color: var(--t2);
  font-family: var(--body);
  font-size: 13px; font-weight:500;
  cursor:pointer;
  transition: all .12s; text-align:left; width:100%;
}
.t-item:hover { background: var(--s3); color: var(--t0); }
.t-ico { font-size:15px; width:20px; text-align:center; flex-shrink:0; }
.t-sep { height:1px; background:var(--b1); margin: 4px 10px; }

/* ═══════════════════════════════════════
   DRAWER HISTORIQUE
═══════════════════════════════════════ */
.drawer-bg {
  position:fixed; inset:0;
  background: rgba(0,0,0,.6);
  backdrop-filter: blur(8px);
  z-index:150;
  opacity:0; pointer-events:none;
  transition: opacity .2s;
}
.drawer-bg.open { opacity:1; pointer-events:all; }

.drawer {
  position:fixed;
  bottom:0; left:50%;
  transform: translateX(-50%) translateY(100%);
  width: min(720px, 100vw);
  background: var(--s1);
  border: 1px solid var(--b3);
  border-bottom:none;
  border-radius: 18px 18px 0 0;
  z-index:151;
  transition: transform .3s cubic-bezier(.4,0,.2,1);
  display:flex; flex-direction:column;
  max-height: 68vh;
  box-shadow: 0 -8px 40px rgba(0,0,0,.5);
}
.drawer.open { transform: translateX(-50%) translateY(0); }

.d-handle {
  width:36px; height:4px;
  background: var(--b3); border-radius:2px;
  margin: 12px auto 0; flex-shrink:0;
}
.d-hdr {
  display:flex; align-items:center; justify-content:space-between;
  padding: 16px 22px 12px;
  border-bottom: 1px solid var(--b1);
  flex-shrink:0;
}
.d-title {
  font-family: var(--cond);
  font-size: 17px; font-weight:700;
  color: var(--t0);
  letter-spacing:.3px;
}
.d-actions { display:flex; gap:8px; }
.btn-sm {
  padding: 6px 13px; border-radius:6px;
  font-size:11px; font-weight:700;
  cursor:pointer; font-family:var(--mono);
  transition:all .12s;
  border: 1px solid var(--b2);
  background: var(--s3); color:var(--t2);
}
.btn-sm:hover { color:var(--t0); background:var(--s4); }
.btn-sm.danger:hover { border-color:var(--alert-bd); color:var(--alert); background:var(--alert-bg); }
.btn-sm.ghost { background:none; border-color:transparent; font-size:17px; padding:4px 8px; }

.d-body {
  overflow-y:auto; padding:12px 16px;
  display:flex; flex-direction:column; gap:5px; flex:1;
}
.hist-empty {
  text-align:center; padding:36px;
  color:var(--t3); font-family:var(--mono); font-size:12px;
}
.hist-row {
  display:flex; align-items:center; gap:12px;
  padding: 10px 14px;
  background: var(--s2);
  border: 1px solid var(--b1);
  border-radius: 8px;
  transition: border-color .12s;
}
.hist-row:hover { border-color:var(--b3); }
.hist-ico { font-size:15px; flex-shrink:0; }
.hist-info { flex:1; min-width:0; }
.hist-ref {
  font-family: var(--mono); font-size:12px; font-weight:600;
  color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.hist-meta {
  font-family: var(--mono); font-size:9px; color:var(--t3); margin-top:3px;
}
.hist-qty {
  font-family: var(--cond);
  font-size:16px; font-weight:800;
  color: var(--ok); white-space:nowrap; flex-shrink:0;
}

/* ═══════════════════════════════════════
   MODALS
═══════════════════════════════════════ */
.modal-bg {
  position:fixed; inset:0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(10px);
  z-index:200;
  display:flex; align-items:center; justify-content:center;
  padding:20px;
  opacity:0; pointer-events:none;
  transition: opacity .2s;
}
.modal-bg.open { opacity:1; pointer-events:all; }

.modal-box {
  background: var(--s2);
  border: 1px solid var(--b3);
  border-radius: 16px;
  padding: 28px 28px 24px;
  max-width: 400px; width:100%;
  box-shadow: 0 32px 80px rgba(0,0,0,.75);
  animation: mIn .22s cubic-bezier(.34,1.4,.64,1);
  position:relative;
}
@keyframes mIn { from{opacity:0;transform:scale(.92) translateY(16px)} to{opacity:1;transform:none} }

/* trait accent haut */
.modal-box::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:2px;
  border-radius:16px 16px 0 0;
  background: linear-gradient(90deg, var(--blue), #a78bfa);
}

.modal-title {
  font-family: var(--cond);
  font-size: 22px; font-weight:800;
  color: var(--t0); letter-spacing:.3px;
  margin-bottom: 4px;
}
.modal-ctx {
  font-family: var(--mono);
  font-size: 10px; color: var(--t3);
  letter-spacing:1.5px; text-transform:uppercase;
  margin-bottom: 24px;
}

.field { margin-bottom:18px; }
.f-label {
  display:block;
  font-family: var(--mono);
  font-size: 9px; font-weight:600;
  color: var(--t3); letter-spacing:2px;
  text-transform:uppercase; margin-bottom:8px;
}
.f-inp {
  width:100%; background: var(--s3);
  border: 1.5px solid var(--b2);
  border-radius: 9px;
  color: var(--t0);
  font-family: var(--cond);
  font-size: 36px; font-weight:700;
  padding: 12px 16px;
  outline:none; text-align:center;
  transition: border-color .15s;
  letter-spacing:-1px;
}
.f-inp:focus { border-color:var(--blue); box-shadow:0 0 0 3px rgba(79,143,255,.12); }

.modal-row { display:flex; gap:10px; margin-top:22px; }
.btn-cancel {
  flex:1; padding:12px;
  background: var(--s3); border:1px solid var(--b2);
  border-radius:9px; color:var(--t2);
  font-family:var(--body); font-size:13px; font-weight:600;
  cursor:pointer; transition:all .12s;
}
.btn-cancel:hover { background:var(--s4); color:var(--t1); }

.btn-confirm {
  flex:2; padding:12px;
  background: var(--blue); border:none;
  border-radius:9px; color:#fff;
  font-family:var(--body); font-size:13px; font-weight:700;
  cursor:pointer; transition:all .15s; letter-spacing:.2px;
  box-shadow: 0 4px 16px rgba(79,143,255,.3);
}
.btn-confirm:hover { background:#3d7af5; box-shadow:0 6px 22px rgba(79,143,255,.45); }
.btn-confirm:active { transform:scale(.97); }

/* ═══════════════════════════════════════
   TOAST
═══════════════════════════════════════ */
.toast {
  position:fixed; bottom:28px; left:50%;
  transform: translateX(-50%) translateY(90px);
  background: var(--s3);
  border: 1px solid var(--b3);
  border-radius: 28px;
  padding: 10px 20px;
  font-family: var(--body);
  font-size: 13px; font-weight:600;
  z-index:999; display:flex; align-items:center; gap:8px;
  transition: transform .3s cubic-bezier(.34,1.4,.64,1);
  pointer-events:none;
  white-space:nowrap;
  box-shadow: 0 10px 36px rgba(0,0,0,.6);
  color: var(--t0);
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════
   BARRE STATUT BAS
═══════════════════════════════════════ */
.statusbar {
  position:fixed; bottom:0; left:0; right:0;
  height:30px;
  background: var(--s0);
  border-top: 1px solid var(--b1);
  display:flex; align-items:center;
  padding: 0 16px; gap:18px;
  z-index:50;
  font-family: var(--mono);
  font-size: 10px; color:var(--t3);
}
.sb-item { display:flex; align-items:center; gap:5px; }
.sb-dot  { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.sb-dot.ok    { background:var(--ok); }
.sb-dot.warn  { background:var(--warn); }
.sb-dot.alert { background:var(--alert); }
.sb-sp { flex:1; }
.sb-sync { color:var(--t3); font-size:10px; }

</style>
</head>
<body>

<div class="page">

  <!-- ══ NAVBAR ══ -->
  <nav class="navbar">
    <div class="nb-brand">
      <div class="nb-logo">AUEM<br>SCIE</div>
      <div>
        <div class="nb-title">Stock Lames de Scie</div>
        <div class="nb-sub">Kanban · 3 scies · HSS + Carbure</div>
      </div>
    </div>

    <div class="nb-indicators" id="nb-indicators">
      <!-- rempli par JS -->
    </div>

    <div class="nb-right">
      <div class="sync-chip">
        <div class="sdot loading" id="sdot"></div>
        <span id="stime">Sync…</span>
      </div>
      <button class="btn-outils" id="btn-outils" onclick="toggleTools()">
        ⚙ Outils
      </button>
    </div>
  </nav>

  <!-- ══ LÉGENDE ══ -->
  <div class="legend-strip">
    <div class="ls-item ok">
      <div class="ls-swatch" style="background:var(--ok)"></div>
      Stock OK
    </div>
    <div class="ls-item warn">
      <div class="ls-swatch" style="background:var(--warn)"></div>
      À commander
    </div>
    <div class="ls-item alert">
      <div class="ls-swatch" style="background:var(--alert)"></div>
      RUPTURE
    </div>
    <div class="ls-item info">
      <div class="ls-swatch" style="background:var(--alert);border-radius:1px"></div>
      Repère MIN = seuil : <span class="ls-seuil-val" id="ls-seuil">—</span>&nbsp;lames
    </div>
    <div class="ls-spacer"></div>
    <div class="ls-time" id="ls-time">—</div>
  </div>

  <!-- ══ SCIES ══ -->
  <div class="scies-wrap" id="scies-wrap"></div>

</div>

<!-- ══ PANNEAU OUTILS ══ -->
<div class="tools-panel" id="tools-panel">
  <button class="t-item" onclick="openSettings();closeTools()">
    <span class="t-ico">⚙</span> Seuil minimum…
  </button>
  <button class="t-item" onclick="openDrawer();closeTools()">
    <span class="t-ico">📋</span> Historique commandes
  </button>
  <div class="t-sep"></div>
  <button class="t-item" onclick="exportPDF();closeTools()">
    <span class="t-ico">📥</span> Export PDF historique
  </button>
</div>

<!-- ══ DRAWER HISTORIQUE ══ -->
<div class="drawer-bg" id="drawer-bg" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="d-handle"></div>
  <div class="d-hdr">
    <div class="d-title">Historique commandes</div>
    <div class="d-actions">
      <button class="btn-sm danger" onclick="clearHist()">Effacer</button>
      <button class="btn-sm ghost" onclick="closeDrawer()">✕</button>
    </div>
  </div>
  <div class="d-body" id="hist-list">
    <div class="hist-empty">Aucune commande enregistrée</div>
  </div>
</div>

<!-- ══ MODAL PARAMÈTRES ══ -->
<div class="modal-bg" id="modal-settings" onclick="if(event.target===this)closeSettings()">
  <div class="modal-box">
    <div class="modal-title">Seuil minimum</div>
    <div class="modal-ctx">SEUIL D'ALERTE COMMANDE — LAMES EN STOCK</div>
    <div class="field">
      <label class="f-label" for="inp-seuil">Nombre de lames</label>
      <input class="f-inp" id="inp-seuil" type="number" min="1" max="20" value="2">
    </div>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeSettings()">Annuler</button>
      <button class="btn-confirm" onclick="confirmSettings()">✓ Enregistrer</button>
    </div>
  </div>
</div>

<!-- ══ MODAL COMMANDE ══ -->
<div class="modal-bg" id="modal-cmd" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-title">Enregistrer une commande</div>
    <div class="modal-ctx" id="modal-ctx">— —</div>
    <div class="field">
      <label class="f-label" for="inp-qty">Quantité reçue / commandée</label>
      <input class="f-inp" id="inp-qty" type="number" min="1" max="99" value="1">
    </div>
    <div class="modal-row">
      <button class="btn-cancel" onclick="closeModal()">Annuler</button>
      <button class="btn-confirm" onclick="confirmCommande()">✓ Confirmer</button>
    </div>
  </div>
</div>

<!-- ══ TOAST ══ -->
<div class="toast" id="toast"><span id="t-i"></span><span id="t-m"></span></div>

<!-- ══ STATUSBAR ══ -->
<div class="statusbar">
  <div class="sb-item"><div class="sb-dot ok"></div><span id="sb-ok">—</span> OK</div>
  <div class="sb-item"><div class="sb-dot warn"></div><span id="sb-warn">—</span> à commander</div>
  <div class="sb-item"><div class="sb-dot alert"></div><span id="sb-alert">—</span> rupture</div>
  <div class="sb-sp"></div>
  <div class="sb-sync">Sync <span id="sb-sync">—</span></div>
</div>

<script>
/* ══════════════════════
   CONFIGURATION
══════════════════════ */
var FB  = 'https://ruban-be81a-default-rtdb.europe-west1.firebasedatabase.app/stock_lames.json';
var FBC = 'https://ruban-be81a-default-rtdb.europe-west1.firebasedatabase.app/config.json';
var SEUIL = 2;
var BAR   = 14;

var SCIES = [
  { id:'kasto',     name:'Kasto CUT E2',  ico:'⚙',  desc:'SCIE À RUBAN AUTOMATIQUE' },
  { id:'behringer', name:'Behringer',      ico:'🔧', desc:'SCIE À RUBAN SEMI-AUTO' },
  { id:'twin',      name:'Twin',           ico:'✂',  desc:'SCIE À RUBAN MANUELLE' }
];
var TYPES = [
  { id:'hss',     label:'HSS',     cls:'hss' },
  { id:'carbure', label:'Carbure', cls:'carbure' }
];

var state = {}, hist = [], pendingCmd = null;
var saveT = null, toastT = null;

/* ══════════════════════
   ÉTAT
══════════════════════ */
function initState() {
  var s = {};
  SCIES.forEach(function(sc) {
    s[sc.id] = {};
    TYPES.forEach(function(t) { s[sc.id][t.id] = 0; });
  });
  return s;
}
function migrate(data) {
  var s = data || initState();
  SCIES.forEach(function(sc) {
    if (!s[sc.id]) s[sc.id] = {};
    TYPES.forEach(function(t) {
      if (typeof s[sc.id][t.id] !== 'number') s[sc.id][t.id] = 0;
    });
  });
  return s;
}

/* ══════════════════════
   SYNC
══════════════════════ */
function setDot(st) {
  var dot = document.getElementById('sdot');
  var txt = document.getElementById('stime');
  dot.className = 'sdot ' + st;
  var ts = pad2(new Date());
  document.getElementById('sb-sync').textContent = ts;
  document.getElementById('ls-time').textContent = 'Sync : ' + ts;
  if (st==='ok')      txt.textContent = ts;
  else if (st==='loading') txt.textContent = 'Sync…';
  else                txt.textContent = 'Hors-ligne';
}
function pad2(d) {
  return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
}

function loadServer() {
  setDot('loading');
  xhr('GET', FB, null, function(ok, data) {
    if (ok) { try { state = migrate(JSON.parse(data)); setDot('ok'); } catch(e) { state=initState(); setDot('error'); } }
    else { loadLocal(); setDot('error'); }
    render();
  });
}
function loadLocal() {
  try { state = migrate(JSON.parse(localStorage.getItem('auem_lames')||'{}')); }
  catch(e) { state = initState(); }
}
function saveServer() {
  setDot('loading');
  var body = JSON.stringify(state);
  xhr('PUT', FB, body, function(ok) {
    localStorage.setItem('auem_lames', body);
    setDot(ok?'ok':'error');
  });
}
function scheduleSave() { clearTimeout(saveT); saveT = setTimeout(saveServer, 600); }
setInterval(loadServer, 30000);

function xhr(method, url, body, cb) {
  var r = new XMLHttpRequest();
  r.open(method, url, true);
  if (body) r.setRequestHeader('Content-Type','application/json');
  r.onreadystatechange = function() {
    if (r.readyState!==4) return;
    cb(r.status===200, r.responseText);
  };
  r.onerror = function() { cb(false, ''); };
  r.send(body);
}

/* ══════════════════════
   CONFIG
══════════════════════ */
function loadConfig() {
  xhr('GET', FBC, null, function(ok, data) {
    if (ok) { try { var c=JSON.parse(data); if (c&&c.seuil_min) SEUIL=c.seuil_min; } catch(e){} }
    updateSeuilDisplay();
  });
}
function saveConfig() {
  xhr('PUT', FBC, JSON.stringify({seuil_min:SEUIL}), function(){});
}
function updateSeuilDisplay() {
  var e = document.getElementById('ls-seuil');
  if (e) e.textContent = SEUIL;
}

/* ══════════════════════
   HISTORIQUE
══════════════════════ */
function loadHist() {
  try { hist = JSON.parse(localStorage.getItem('auem_lames_hist')||'[]'); }
  catch(e) { hist = []; }
}
function saveHist() { localStorage.setItem('auem_lames_hist', JSON.stringify(hist)); }
function addHist(scId, tpId, qty) {
  var sc = SCIES.find(function(s){ return s.id===scId; });
  var tp = TYPES.find(function(t){ return t.id===tpId; });
  hist.unshift({ scie:sc?sc.name:scId, type:tp?tp.label:tpId, qty:qty, date:new Date().toISOString() });
  if (hist.length>100) hist.pop();
  saveHist();
}
function clearHist() {
  if (!confirm('Effacer tout l\'historique ?')) return;
  hist=[]; saveHist(); renderHist();
  showToast('Historique effacé', '🗑');
}

/* ══════════════════════
   STATUT
══════════════════════ */
function st(qty) {
  if (qty<=0)     return 'alert';
  if (qty<=SEUIL) return 'warn';
  return 'ok';
}
function stLabel(qty) {
  if (qty<=0)     return '■ RUPTURE';
  if (qty<=SEUIL) return '▲ COMMANDER';
  return '● OK';
}
function stNumCls(qty) {
  if (qty<=0)     return 'c-alert';
  if (qty<=SEUIL) return 'c-warn';
  return 'c-ok';
}

/* ══════════════════════
   RENDER
══════════════════════ */
function render() {
  renderScies();
  renderHist();
  renderIndicators();
  renderStatusbar();
  updateSeuilDisplay();
}

function renderIndicators() {
  var ok=0, warn=0, alert=0;
  SCIES.forEach(function(sc) {
    TYPES.forEach(function(t) {
      var q=(state[sc.id]&&state[sc.id][t.id])||0;
      var s=st(q);
      if(s==='ok') ok++;
      else if(s==='warn') warn++;
      else alert++;
    });
  });
  var el = document.getElementById('nb-indicators');
  el.innerHTML =
    '<div class="nb-ind i-ok"><div class="nb-ind-dot ok"></div>' + ok + ' OK</div>' +
    (warn  ? '<div class="nb-ind i-warn"><div class="nb-ind-dot warn"></div>' + warn + ' commander</div>' : '') +
    (alert ? '<div class="nb-ind i-alert"><div class="nb-ind-dot alert"></div>' + alert + ' rupture</div>' : '');
}

function renderStatusbar() {
  var ok=0, warn=0, alert=0;
  SCIES.forEach(function(sc) {
    TYPES.forEach(function(t) {
      var q=(state[sc.id]&&state[sc.id][t.id])||0;
      var s=st(q); if(s==='ok') ok++; else if(s==='warn') warn++; else alert++;
    });
  });
  document.getElementById('sb-ok').textContent    = ok;
  document.getElementById('sb-warn').textContent  = warn;
  document.getElementById('sb-alert').textContent = alert;
}

function renderScies() {
  var wrap = document.getElementById('scies-wrap');
  wrap.innerHTML = '';
  SCIES.forEach(function(scie) {
    var total=0, worst='ok';
    TYPES.forEach(function(t) {
      var q=(state[scie.id]&&state[scie.id][t.id])||0;
      total+=q;
      var s=st(q);
      if(s==='alert') worst='alert';
      else if(s==='warn'&&worst!=='alert') worst='warn';
    });
    var block = document.createElement('div');
    block.className = 'scie-block s-'+worst;

    var hdr =
      '<div class="scie-hdr">' +
        '<div class="scie-ico">'+scie.ico+'</div>' +
        '<div><div class="scie-name">'+scie.name+'</div><div class="scie-desc">'+scie.desc+'</div></div>' +
        '<div class="scie-total-pill">'+total+' lames</div>' +
      '</div>';

    var lames = '<div class="lames-row">';
    TYPES.forEach(function(type) {
      var qty=(state[scie.id]&&state[scie.id][type.id])||0;
      lames += buildCard(scie, type, qty);
    });
    lames += '</div>';

    block.innerHTML = hdr + lames;
    wrap.appendChild(block);
  });

  /* délégation événements */
  wrap.querySelectorAll('[data-act]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var a=btn.dataset.act, sc=btn.dataset.sc, tp=btn.dataset.tp;
      if(a==='plus')  changeQty(sc,tp,1);
      if(a==='minus') changeQty(sc,tp,-1);
      if(a==='cmd')   openCommande(sc,tp);
    });
  });
}

function buildCard(scie, type, qty) {
  var status = st(qty);
  var badgeCls = 'kb-badge ' + status;

  /* barre */
  var bar = '<div class="kanban-bar">';
  for (var i=0; i<BAR; i++) {
    if (i===SEUIL) bar += '<div class="kb-min-mark"></div>';
    var fc = '';
    if (i<qty) {
      if (qty<=0)      fc='f-alert';
      else if(qty<=SEUIL) fc='f-warn';
      else             fc='f-ok';
    }
    bar += '<div class="kb-seg '+fc+'"></div>';
  }
  bar += '</div>';

  return (
    '<div class="lame-card">'+
      '<div class="lame-top">'+
        '<div class="lame-type-tag '+type.cls+'">'+type.label+'</div>'+
        '<div class="'+badgeCls+'">'+stLabel(qty)+'</div>'+
      '</div>'+

      '<div class="cpt-zone">'+
        '<div class="cpt-btns">'+
          '<button class="cpt-btn plus"  data-act="plus"  data-sc="'+scie.id+'" data-tp="'+type.id+'" title="+ 1 lame">+</button>'+
          '<button class="cpt-btn minus" data-act="minus" data-sc="'+scie.id+'" data-tp="'+type.id+'" title="− 1 lame">−</button>'+
        '</div>'+
        '<div class="cpt-num-wrap">'+
          '<div class="cpt-num '+stNumCls(qty)+'" id="num-'+scie.id+'-'+type.id+'">'+qty+'</div>'+
          '<div class="cpt-unit">lames en stock</div>'+
        '</div>'+
      '</div>'+

      '<div class="bar-section">'+
        '<div class="bar-meta"><span>0</span><span>MIN = '+SEUIL+'</span><span>'+BAR+'+</span></div>'+
        bar+
      '</div>'+

      '<button class="btn-cmd" data-act="cmd" data-sc="'+scie.id+'" data-tp="'+type.id+'">'+
        '📦 Enregistrer une commande'+
      '</button>'+
    '</div>'
  );
}

function renderHist() {
  var el = document.getElementById('hist-list');
  if (!hist.length) { el.innerHTML='<div class="hist-empty">Aucune commande enregistrée</div>'; return; }
  el.innerHTML = hist.map(function(h) {
    var d=new Date(h.date);
    var ds=d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    return '<div class="hist-row"><span class="hist-ico">📦</span>'+
      '<div class="hist-info"><div class="hist-ref">'+h.scie+' — '+h.type+'</div>'+
      '<div class="hist-meta">'+ds+'</div></div>'+
      '<div class="hist-qty">+'+h.qty+'</div></div>';
  }).join('');
}

/* ══════════════════════
   ACTIONS
══════════════════════ */
function changeQty(scId, tpId, delta) {
  if (!state[scId]) state[scId]={};
  var cur=state[scId][tpId]||0;
  var nv=Math.max(0,cur+delta);
  state[scId][tpId]=nv;

  /* animation nombre */
  var numEl=document.getElementById('num-'+scId+'-'+tpId);
  if (numEl) {
    numEl.textContent=nv;
    numEl.className='cpt-num '+stNumCls(nv);
    numEl.classList.remove('bump');
    void numEl.offsetWidth;
    numEl.classList.add('bump');
  }
  render(); scheduleSave();
  if (delta<0 && nv<=SEUIL && nv>0) showToast('Stock bas — pensez à commander','▲');
  if (nv<=0) showToast('RUPTURE ! Commandez immédiatement','■');
}

/* ══════════════════════
   MODAL COMMANDE
══════════════════════ */
function openCommande(scId, tpId) {
  var sc=SCIES.find(function(s){return s.id===scId;});
  var tp=TYPES.find(function(t){return t.id===tpId;});
  pendingCmd={scId:scId,tpId:tpId};
  document.getElementById('modal-ctx').textContent=(sc?sc.name:scId)+' · Lames '+(tp?tp.label:tpId);
  document.getElementById('inp-qty').value='1';
  document.getElementById('modal-cmd').classList.add('open');
  setTimeout(function(){document.getElementById('inp-qty').focus();document.getElementById('inp-qty').select();},100);
}
function closeModal() { document.getElementById('modal-cmd').classList.remove('open'); pendingCmd=null; }
function confirmCommande() {
  if (!pendingCmd) return;
  var qty=parseInt(document.getElementById('inp-qty').value)||0;
  if (qty<=0) { showToast('Quantité invalide','⚠'); return; }
  if (!state[pendingCmd.scId]) state[pendingCmd.scId]={};
  state[pendingCmd.scId][pendingCmd.tpId]=(state[pendingCmd.scId][pendingCmd.tpId]||0)+qty;
  addHist(pendingCmd.scId,pendingCmd.tpId,qty);
  var sc=SCIES.find(function(s){return s.id===pendingCmd.scId;});
  var tp=TYPES.find(function(t){return t.id===pendingCmd.tpId;});
  closeModal(); render(); scheduleSave();
  showToast('+'+qty+' lames '+(tp?tp.label:'')+' — '+(sc?sc.name:''),'✅');
}
document.getElementById('inp-qty').addEventListener('keydown',function(e){
  if(e.key==='Enter') confirmCommande();
  if(e.key==='Escape') closeModal();
});

/* ══════════════════════
   PARAMÈTRES
══════════════════════ */
function openSettings() {
  document.getElementById('inp-seuil').value=SEUIL;
  document.getElementById('modal-settings').classList.add('open');
  setTimeout(function(){document.getElementById('inp-seuil').focus();document.getElementById('inp-seuil').select();},100);
}
function closeSettings() { document.getElementById('modal-settings').classList.remove('open'); }
function confirmSettings() {
  var v=parseInt(document.getElementById('inp-seuil').value)||2;
  if(v<1){showToast('Minimum 1','⚠');return;}
  SEUIL=v; saveConfig(); closeSettings(); render();
  showToast('Seuil MIN = '+SEUIL+' lames','✓');
}
document.getElementById('inp-seuil').addEventListener('keydown',function(e){
  if(e.key==='Enter') confirmSettings();
  if(e.key==='Escape') closeSettings();
});

/* ══════════════════════
   OUTILS PANEL
══════════════════════ */
function toggleTools() { document.getElementById('tools-panel').classList.toggle('open'); }
function closeTools()  { document.getElementById('tools-panel').classList.remove('open'); }
document.addEventListener('click',function(e){
  var p=document.getElementById('tools-panel');
  var b=document.getElementById('btn-outils');
  if(!p.contains(e.target)&&e.target!==b&&!b.contains(e.target)) closeTools();
});

/* ══════════════════════
   DRAWER
══════════════════════ */
function openDrawer()  {
  renderHist();
  document.getElementById('drawer-bg').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}
function closeDrawer() {
  document.getElementById('drawer-bg').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

/* ══════════════════════
   EXPORT PDF
══════════════════════ */
function exportPDF() {
  if (!hist.length) { showToast('Aucun historique','⚠'); return; }
  var rows=hist.map(function(h) {
    var d=new Date(h.date);
    var ds=d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
    return '<tr><td>'+h.scie+'</td><td>'+h.type+'</td><td style="text-align:center;font-weight:700">+'+h.qty+'</td><td>'+ds+'</td></tr>';
  }).join('');
  var html='<!DOCTYPE html><html><head><meta charset="utf-8"><style>body{font-family:Arial,sans-serif;font-size:13px;color:#222;padding:24px}h1{font-size:18px;margin-bottom:4px}p{color:#666;font-size:11px;margin-bottom:20px}table{width:100%;border-collapse:collapse}th{background:#f5f5f5;padding:8px 12px;text-align:left;border-bottom:2px solid #ddd;font-size:11px;text-transform:uppercase}td{padding:8px 12px;border-bottom:1px solid #eee}tr:nth-child(even)td{background:#fafafa}</style></head><body><h1>AUEM — Historique lames de scie</h1><p>Généré le '+new Date().toLocaleDateString('fr-FR')+' à '+new Date().toLocaleTimeString('fr-FR')+' · '+hist.length+' entrées</p><table><thead><tr><th>Scie</th><th>Type</th><th>Qté</th><th>Date</th></tr></thead><tbody>'+rows+'</tbody></table></body></html>';
  var w=window.open('','_blank');
  w.document.write(html); w.document.close();
  setTimeout(function(){w.print();},400);
  showToast('Impression lancée','📥');
}

/* ══════════════════════
   TOAST
══════════════════════ */
function showToast(msg, ico) {
  document.getElementById('t-i').textContent=ico||'';
  document.getElementById('t-m').textContent=msg;
  var el=document.getElementById('toast');
  el.classList.add('show');
  clearTimeout(toastT);
  toastT=setTimeout(function(){el.classList.remove('show');},2600);
}

/* ══════════════════════
   KEYBOARD
══════════════════════ */
document.addEventListener('keydown',function(e){
  if(e.key==='Escape'){closeModal();closeSettings();closeDrawer();closeTools();}
});

/* ══════════════════════
   INIT
══════════════════════ */
loadHist();
loadConfig();
loadServer();
</script>
